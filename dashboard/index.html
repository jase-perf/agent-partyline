<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Party Line — Dashboard</title>
<link rel="stylesheet" href="/dashboard.css">
</head>
<body>

<header>
  <h1>Party Line</h1>
  <span class="conn-status" id="connStatus">connecting...</span>
</header>

<div class="main">
  <div class="sessions">
    <h2>Sessions</h2>
    <div id="sessionList"><span style="color:var(--text-dim)">waiting for heartbeats...</span></div>
    <div class="quota-panel" id="quotaPanel" style="display:none">
      <h2>API Quota</h2>
      <div class="quota-row">
        <div class="quota-label"><span>5-hour window</span><span class="quota-pct" id="quota5hPct">—</span></div>
        <div class="quota-bar-bg"><div class="quota-bar-fg ok" id="quota5hBar" style="width:0%"></div></div>
        <div class="quota-reset" id="quota5hReset"></div>
      </div>
      <div class="quota-row">
        <div class="quota-label"><span>Weekly</span><span class="quota-pct" id="quota7dPct">—</span></div>
        <div class="quota-bar-bg"><div class="quota-bar-fg ok" id="quota7dBar" style="width:0%"></div></div>
        <div class="quota-reset" id="quota7dReset"></div>
      </div>
      <div class="quota-fetched" id="quotaFetched"></div>
    </div>
  </div>

  <div class="feed-container">
    <div class="filters">
      <label><input type="checkbox" id="showHeartbeats"> Show heartbeats</label>
      <label><input type="checkbox" id="showAnnounce" checked> Show announces</label>
      <label><input type="checkbox" id="autoscroll" checked> Auto-scroll</label>
      <span id="msgCount" style="margin-left:auto">0 messages</span>
    </div>
    <div class="feed" id="feed"></div>
    <div class="send-bar">
      <label>To:</label>
      <input class="to" id="sendTo" placeholder="session or all" value="all">
      <label>Type:</label>
      <select id="sendType">
        <option value="message">message</option>
        <option value="request">request</option>
        <option value="status">status</option>
      </select>
      <input class="msg" id="sendMsg" placeholder="Type a message..." autofocus>
      <button id="sendBtn">Send</button>
    </div>
  </div>
</div>

<div class="ctx-menu" id="ctxMenu"></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Session</h3>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="/dashboard.js"></script>
</body>
</html>
