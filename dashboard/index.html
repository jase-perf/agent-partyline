<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Party Line — Mission Control</title>
<link rel="stylesheet" href="/dashboard.css">
</head>
<body>

<header>
  <h1>Party Line</h1>
  <nav class="tabs" id="tabs">
    <button data-view="switchboard" class="active">Switchboard</button>
    <button data-view="session-detail" disabled>Session</button>
    <button data-view="history">History</button>
  </nav>
  <span class="conn-status" id="connStatus">connecting...</span>
</header>

<div class="main">

  <section data-view="switchboard" class="view active">
    <div class="sessions">
      <h2>Sessions</h2>
      <div id="sessionList"><span style="color:var(--text-dim)">waiting for heartbeats...</span></div>
      <div class="quota-panel" id="quotaPanel" style="display:none">
        <h2>API Quota</h2>
        <div class="quota-row">
          <div class="quota-label"><span>5-hour window</span><span class="quota-pct" id="quota5hPct">—</span></div>
          <div class="quota-bar-bg"><div class="quota-bar-fg ok" id="quota5hBar" style="width:0%"></div></div>
          <div class="quota-reset" id="quota5hReset"></div>
        </div>
        <div class="quota-row">
          <div class="quota-label"><span>Weekly</span><span class="quota-pct" id="quota7dPct">—</span></div>
          <div class="quota-bar-bg"><div class="quota-bar-fg ok" id="quota7dBar" style="width:0%"></div></div>
          <div class="quota-reset" id="quota7dReset"></div>
        </div>
        <div class="quota-fetched" id="quotaFetched"></div>
      </div>
    </div>

    <div class="overview-right">
      <div id="overview-grid"></div>
      <div class="feed-container">
        <div class="filters">
          <label><input type="checkbox" id="showHeartbeats"> Show heartbeats</label>
          <label><input type="checkbox" id="showAnnounce" checked> Show announces</label>
          <label><input type="checkbox" id="autoscroll" checked> Auto-scroll</label>
          <span id="msgCount" style="margin-left:auto">0 messages</span>
        </div>
        <div class="feed" id="feed"></div>
        <div class="send-bar">
          <label>To:</label>
          <input class="to" id="sendTo" placeholder="session or all" value="all">
          <label>Type:</label>
          <select id="sendType">
            <option value="message">message</option>
            <option value="request">request</option>
            <option value="status">status</option>
          </select>
          <input class="msg" id="sendMsg" placeholder="Type a message..." autofocus>
          <button id="sendBtn">Send</button>
        </div>
      </div>
    </div>
  </section>

  <section data-view="session-detail" class="view" hidden>
    <div class="detail-header">
      <span class="state-pill" id="detail-state"></span>
      <h2 id="detail-name"></h2>
      <div class="detail-meta">
        <span id="detail-cwd"></span>
        <span id="detail-model"></span>
        <span id="detail-ctx"></span>
      </div>
    </div>
    <div class="detail-columns">
      <div class="detail-col">
        <h3>Subagents</h3>
        <ul id="detail-subagents"><li class="empty-msg">No subagents.</li></ul>
      </div>
      <div class="detail-col">
        <h3>Event timeline</h3>
        <ul id="detail-timeline"><li class="empty-msg">No events yet.</li></ul>
      </div>
    </div>
  </section>

<section data-view="history" class="view" hidden>
    <h2>History</h2>

    <details class="history-bus" id="historyBus">
      <summary>Party-line bus <span id="bus-count" class="bus-count">0</span></summary>
      <div class="filters history-bus-filters">
        <label><input type="checkbox" id="showHeartbeats2"> Show heartbeats</label>
        <label><input type="checkbox" id="showAnnounce2" checked> Show announces</label>
      </div>
      <div class="feed" id="feed2"></div>
    </details>

    <div class="history-controls">
      <input type="search" id="history-filter" placeholder="Filter events...">
      <select id="history-hook-filter">
        <option value="">All hooks</option>
      </select>
    </div>
    <ul id="history-list"></ul>
  </section>

</div>

<div class="ctx-menu" id="ctxMenu"></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Session</h3>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="/dashboard.js"></script>
</body>
</html>
